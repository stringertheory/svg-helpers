repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: cog-check
        name: cog --check README.md
        entry: uv run cog --check README.md
        language: system
        pass_filenames: false
        files: ^(README\.md|examples/.*\.py)$
